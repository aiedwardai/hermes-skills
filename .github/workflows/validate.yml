name: Validate Skills

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run regression tests
        run: python -m unittest discover -s tests -v
      - name: Validate Python syntax
        run: python -m py_compile skills/wordpress-auto-publisher/wordpress-upload-images.py
      - name: Validate shell syntax
        run: bash -n skills/fenghuang-fm/scripts/fenghuang_fm_transcribe.sh skills/vtts/vtts.sh
